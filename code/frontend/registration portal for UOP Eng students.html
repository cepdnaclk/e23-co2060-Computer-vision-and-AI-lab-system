<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration form for students</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      line-height: 1.6;
    }

    header {
      background-color: #143557;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    main {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    article {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    fieldset {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 20px;
      background-color: #fafafa;
    }

    legend {
      font-size: 1.2em;
      font-weight: bold;
      color: #2c3e50;
      padding: 0 10px;
      margin-left: -10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      background-color: #27ae60;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
    }

    button:hover { background-color: #229954; }

    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    .required::after {
      content: " *";
      color: #e74c3c;
    }

    figure {
      margin: 0 0 20px 0;
      text-align: center;
    }

    figcaption {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <!-- Header (Semantic) -->
  <header>
    <h1>Registration portal</h1>
    <p>For UOP Engineering students</p>
  </header>

  <!-- Main (Semantic) -->
  <main>
    <!-- Article (Semantic) -->
    <article>
      <!-- Optional figure area (Semantic) -->
      <figure>
        <!-- You can replace src with a real image later -->
        <img src="C:\Users\LENOVO LEGION\Documents\sem 3\2yp\code\e23-co2060-Computer-vision-and-AI-lab-system\docs\images\uop_logo.png" alt="UOP logo" style="max-width:25%; border-radius:6px;">
        <figcaption>University of Peradeniya</figcaption>
      </figure>

      <!-- Form with data-* attributes -->
      <form
        action="/submit-product"
        method="POST"
        data-form-id="product-form-v1"
        data-product-type="electronics"
        data-vendor-id="12345"
        data-requires-approval="true"
      >

        <!-- SECTION 1 (Semantic) -->
        <section>
          <fieldset>
            <legend>Student details</legend>

            <div class="form-group">
              <label for="Username" class="required">User name</label>
              <input type="text" id="Username" name="Username" required maxlength="50">
            </div>

            <div class="form-group">
              <label for="e_number" class="required">E-number</label>
              <input
                type="text"
                id="e_number"
                name="e_number"
                required
                placeholder="e.g., E/23/273"
                inputmode="text"
                pattern="^E\/(19|20|21|22|23|24)\/(00[0-9]|0[0-9][0-9]|[1-3][0-9][0-9]|4[0-4][0-9]|450)$"
                title="Format must be E/YY/NNN where YY is 19–24 and NNN is 000–450 (e.g., E/23/273)"
              >
            </div>

            <div class="form-group">
              <label for="department" class="required">department</label>
              <select id="department" name="department" required>
                <option value="">Select a category</option>
                <option value="Electrical and Electronic Engineering">Electrical and Electronic Engineering</option>
                <option value="Computer Engineering">Computer Engineering</option>
                <option value="Mechanical Engineering">Mechanical Engineering</option>
                <option value="Chemical & ProcessEngineering">Chemical & ProcessEngineering</option>
                <option value="Civil Engineering">Civil Engineering</option>
                <option value="Manufacturing & Industrial Engineering">Manufacturing & Industrial Engineering</option>
              </select>
            </div>

          </fieldset>
        </section>

        
        <!-- Buttons -->
        <div class="form-group">
          <button type="submit">Submit details</button>
          <button type="reset">Reset</button>
        </div>

      </form>
    </article>
  </main>

  <!-- Footer (Semantic) -->
  <footer>
    <p>&copy; 2026 Product Submission Portal. All rights reserved.</p>
  </footer>

</body>
</html>
